workflows:
  android-release:
    name: My Tasker — Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.27.4
      java: 17
      groups:
        - default
      vars:
        PACKAGE_NAME: "com.mytasker.app"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.pub-cache

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze (warnings only)
        script: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK
        script: |
          flutter build apk --release \
            --split-per-abi \
            --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - build/app/outputs/flutter-apk/app-x86_64-release.apk

    publishing:
      email:
        recipients:
          - shehab.eidgah2006@gmail.com
        notify:
          success: true
          failure: true

  android-debug:
    name: My Tasker — Debug APK (quick test)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: 3.27.4
      java: 17

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - shehab.eidgah2006@gmail.com
        notify:
          success: true
          failure: false
